name: Python Tests

on:
  pull_request:
  push:
    branches: [main, q1-genesis]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'poc/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r poc/requirements.txt

      - name: Run test suite
        run: pytest poc/tests/ -v
