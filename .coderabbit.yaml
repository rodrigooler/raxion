reviews:
  auto_review:
    enabled: true
    drafts: false
  high_level_summary: true
  poem: false
  review_status: true
  path_filters:
    - "**"
    - "!runtime/agave/**"
    - "!third_party/**"
    - "!target/**"
    - "!**/target/**"
    - "!explorer/.next/**"
    - "!explorer/out/**"
    - "!poc/benchmarks/results/**"
    - "!**/node_modules/**"
    - "!**/*.lock"

