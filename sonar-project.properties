# SonarQube/SonarCloud scope tuning for RAXION.
# Goal: analyze only first-party protocol code and skip vendored/subtree/generated assets.

sonar.sources=programs/raxion-poiq,runtime/cognitive,sdk/agent,poc,proofs/risc0-guest,proofs/risc0-host
sonar.tests=poc/tests

# Ignore large external code and generated/build outputs.
sonar.exclusions=runtime/agave/**,third_party/**,target/**,**/target/**,**/.venv/**,**/.venv*/**,explorer/**,site/**,docs/**,poc/benchmarks/results/**,**/node_modules/**,**/*.lock

# Security hotspots: keep focused on core protocol code.
sonar.security.exclusions=runtime/agave/**,third_party/**,target/**,**/target/**,explorer/**,site/**,docs/**,scripts/**

# Duplicate-code checks on vendored trees are noisy and expensive.
sonar.cpd.exclusions=runtime/agave/**,third_party/**
