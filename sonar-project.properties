# SonarQube/SonarCloud scope tuning for RAXION.
# Goal: analyze only first-party code and skip vendored/subtree/generated artifacts.

sonar.sources=programs,runtime/cognitive,sdk,poc,proofs,scripts,explorer,site,docs

# Ignore large external code and generated/build outputs.
sonar.exclusions=runtime/agave/**,third_party/**,target/**,**/target/**,**/.venv/**,**/.venv*/**,explorer/.next/**,explorer/out/**,poc/benchmarks/results/**,**/node_modules/**,**/*.lock

# Security hotspots: keep focused on first-party code.
sonar.security.exclusions=runtime/agave/**,third_party/**,target/**,**/target/**,explorer/.next/**,explorer/out/**

# Duplicate-code checks on vendored trees are noisy and expensive.
sonar.cpd.exclusions=runtime/agave/**,third_party/**

